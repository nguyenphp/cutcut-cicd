name: Deploy to TestFlight (Public Builder)

on:
  workflow_dispatch: # Bấm Run workflow trên GitHub — người bấm lấy tự động từ github.actor
    inputs:
      committer_name:
        description: 'Tên người kích hoạt build'
        required: false
        default: ''
  push:
    tags:
      - 'v*' # Tự động chạy khi bạn push tag dạng v1.0.0, v1.0.1...

env:
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  TELEGRAM_TOPIC_ID: 2 # Gửi tin nhắn vào Topic ID = 2
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
  GROQ_MODEL: llama-3.3-70b-versatile

jobs:
  deploy:
    name: Build & Deploy iOS App
    runs-on: macos-latest # Chạy trên macOS runner của GitHub (chứa sẵn Xcode 26 / iOS 26 SDK)

    steps:
      # 1. Capture thời gian bắt đầu
      - name: Capture Job Start Time
        run: echo "JOB_START_TIME=$(date +%s)" >> $GITHUB_ENV

      - name: Select Xcode Version
        run: |
          sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer
          xcodebuild -version

      # 2. Checkout mã nguồn từ repo Private (full history + tags để tạo changelog)
      - name: Checkout Private Source Code
        uses: actions/checkout@v4
        with:
          repository: nguyenphp/vibecut # Đường dẫn repo Private chứa code iOS của bạn
          token: ${{ secrets.PRIVATE_REPO_PAT }} # Personal Access Token để tải repo Private
          path: source # Tải source code vào thư mục con 'source'
          fetch-depth: 0 # Lấy TOÀN BỘ history + tag để gom commit kể từ tag gần nhất

      # 3. Lấy người kích hoạt build + gom commit kể từ tag gần nhất
      - name: Get Build Information
        id: info
        run: |
          # Người bấm build / push tag: lấy từ input hoặc tự động từ GitHub
          BUILDER="${{ github.event.inputs.committer_name }}"
          if [ -z "$BUILDER" ]; then
            BUILDER="${{ github.actor }}"
          fi
          if [ "$BUILDER" = "nguyenphp" ]; then
            BUILDER="Nguyên Phạm - Percy"
          fi
          echo "builder=$BUILDER" >> $GITHUB_OUTPUT

          # Lấy marketing version từ project settings
          VERSION=$(grep -m 1 "MARKETING_VERSION" source/ios/VibeCut/VibeCut.xcodeproj/project.pbxproj | awk -F'= ' '{print $2}' | tr -d ';[:space:]"')
          if [ -z "$VERSION" ]; then
            VERSION="1.0"
          fi
          echo "app_version=$VERSION" >> $GITHUB_OUTPUT

          cd source
          # Xác định khoảng commit kể từ tag gần nhất
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            CURRENT="${{ github.ref_name }}"
            PREV=$(git describe --tags --abbrev=0 "${CURRENT}^" 2>/dev/null || echo "")
            if [[ -n "$PREV" ]]; then RANGE="$PREV..$CURRENT"; else RANGE="$CURRENT"; fi
          else
            PREV=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            if [[ -n "$PREV" ]]; then RANGE="$PREV..HEAD"; else RANGE="HEAD"; fi
          fi
          echo "📌 Range: $RANGE (prev tag: ${PREV:-none})"

          COMMITS_ALL=$(git log $RANGE --no-merges --pretty=format:"- %s" 2>/dev/null || echo "")
          if [[ -z "$COMMITS_ALL" ]]; then COMMITS_ALL="- Cập nhật hệ thống."; fi
          COUNT=$(printf '%s\n' "$COMMITS_ALL" | grep -c '^- ' || echo 0)
          COMMITS=$(printf '%s\n' "$COMMITS_ALL" | head -n 80)

          echo "prev_tag=${PREV:-}" >> $GITHUB_OUTPUT
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          {
            echo "commits<<EOF"
            echo "$COMMITS"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      # 4. Nhờ Groq tổng hợp release notes + đặt tên build (mood)
      - name: Generate Release Notes & Mood (Groq)
        id: notes
        env:
          COMMITS: ${{ steps.info.outputs.commits }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          call_groq() {
            local prompt=$1 payload response
            payload=$(jq -n --arg m "$GROQ_MODEL" --arg p "$prompt" \
              '{model:$m, messages:[{role:"user",content:$p}], temperature:0.7}')
            response=$(curl -s -X POST "https://api.groq.com/openai/v1/chat/completions" \
              -H "Authorization: Bearer $GROQ_API_KEY" -H "Content-Type: application/json" -d "$payload")
            if echo "$response" | jq -e '.choices[0].message.content' >/dev/null 2>&1; then
              echo "$response" | jq -r '.choices[0].message.content'
            else
              echo "::warning::Groq lỗi: $(echo "$response" | jq -r '.error.message // "unknown"' 2>/dev/null)"
              return 1
            fi
          }

          # Release notes
          PROMPT="Bạn là AI chuyên nghiệp. Viết bản tóm tắt 'Tính năng mới & Cập nhật' cho bản $REF_NAME của app CutCut (trình chỉnh sửa video iOS) bằng tiếng Việt, ngắn gọn súc tích. Yêu cầu: mỗi dòng bắt đầu bằng dấu gạch (-); KHÔNG hiển thị hoặc đề cập đến bất kỳ mã task nào (như US-1234, US-xxxx); tập trung thay đổi chính; tối đa 10 dòng, mỗi dòng dưới 100 ký tự; không nhắc commit hash hay mã nguồn; không dùng markdown phức tạp.\n\nDanh sách thay đổi:\n$COMMITS"
          NOTES=$(call_groq "$PROMPT") || NOTES="- Cập nhật hệ thống và cải tiến hiệu năng."
          NOTES=$(echo "$NOTES" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')

          # Build mood (tên build)
          MOOD_PROMPT="Dựa trên danh sách thay đổi sau, đặt một tên tóm tắt nội dung chính chuyên nghiệp bằng tiếng Việt cho bản build CutCut này kèm emoji phù hợp (VD: 'Nâng cấp Auto Cut & Tối ưu xuất video 🚀'). Chỉ trả về duy nhất cái tên, tối đa 60 ký tự, không kèm mã task.\n\nDanh sách thay đổi:\n$COMMITS"
          MOOD=$(call_groq "$MOOD_PROMPT") || MOOD="Cập nhật CutCut 🎬"
          MOOD=$(echo "$MOOD" | head -n 1 | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')

          {
            echo "notes<<EOF"; echo "$NOTES"; echo "EOF"
            echo "mood<<EOF"; echo "$MOOD"; echo "EOF"
          } >> $GITHUB_OUTPUT

      # 5. Gửi thông báo bắt đầu build về Telegram Topic 2
      - name: Send Build Started Notification
        env:
          MOOD: ${{ steps.notes.outputs.mood }}
          NOTES: ${{ steps.notes.outputs.notes }}
          BUILDER: ${{ steps.info.outputs.builder }}
          COUNT: ${{ steps.info.outputs.count }}
          REF: ${{ github.ref_name }}
          APP_VERSION: ${{ steps.info.outputs.app_version }}
        run: |
          MSG="🎬 *Bắt đầu build: ${MOOD}*

          🏷️ *Phiên bản:* ${APP_VERSION} (${REF})
          👨‍💻 *Người ấn build:* ${BUILDER}
          📦 *Số commit:* ${COUNT}

          📝 *Có gì mới:*
          ${NOTES}"

          curl -s -X POST https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d message_thread_id="${TELEGRAM_TOPIC_ID}" \
            --data-urlencode text="$MSG" \
            -d parse_mode="Markdown"

      # 6. Cài đặt chứng chỉ Apple Certificate (.p12)
      - name: Install Apple Certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Giải mã chứng chỉ .p12 từ secrets
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          # Tạo keychain tạm thời
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import chứng chỉ
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      # 7. Cài đặt Provisioning Profile (.mobileprovision)
      - name: Install Provisioning Profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp source/CutCut_Prod.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/3ae93c16-bb7d-470f-86e3-73d66cce07c1.mobileprovision

      # 8. Cài đặt Ruby và Bundler
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: source/ios/VibeCut

      # 9. Chạy Fastlane để tự động hóa build và upload lên TestFlight
      - name: Build & Push to TestFlight via Fastlane
        id: fastlane
        working-directory: source/ios/VibeCut
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        run: |
          bundle exec fastlane beta

      # 10. Tính toán kết quả build và dung lượng file .ipa
      - name: Calculate Build Stats
        if: always()
        id: stats
        run: |
          # Tính thời gian chạy
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - JOB_START_TIME))
          MINUTES=$((DURATION / 60))
          SECONDS=$((DURATION % 60))
          echo "duration=${MINUTES}m ${SECONDS}s" >> $GITHUB_OUTPUT

          # Lấy kích thước file .ipa nếu build thành công
          IPA_PATH=$(find source/ios/VibeCut -name "*.ipa" | head -n 1)
          if [ -f "$IPA_PATH" ]; then
            SIZE=$(du -sh "$IPA_PATH" | cut -f1)
            echo "size=$SIZE" >> $GITHUB_OUTPUT
          else
            echo "size=N/A" >> $GITHUB_OUTPUT
          fi

      # 11. Gửi thông báo kết quả cuối cùng về Telegram Topic 2
      - name: Send Telegram Final Notification
        if: always()
        env:
          MOOD: ${{ steps.notes.outputs.mood }}
          NOTES: ${{ steps.notes.outputs.notes }}
          BUILDER: ${{ steps.info.outputs.builder }}
          REF: ${{ github.ref_name }}
          DURATION: ${{ steps.stats.outputs.duration }}
          SIZE: ${{ steps.stats.outputs.size }}
          STATUS: ${{ job.status }}
          APP_VERSION: ${{ steps.fastlane.outputs.app_version }}
          APP_BUILD: ${{ steps.fastlane.outputs.app_build }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # Xác định chuỗi phiên bản
          if [ -n "$APP_VERSION" ] && [ -n "$APP_BUILD" ]; then
            VERSION_STR="${APP_VERSION} (${APP_BUILD})"
          else
            # Fallback nếu không lấy được build number từ Fastlane (ví dụ: build lỗi giữa chừng)
            VERSION_STR="${{ steps.info.outputs.app_version }} (${REF})"
          fi

          if [ "$STATUS" = "success" ]; then
            MSG="✅ *Build thành công — hàng đã có trên TestFlight!*

          🎬 *${MOOD}*
          📌 *Phiên bản:* ${VERSION_STR}
          🕐 *Thời gian build:* ${DURATION}
          📦 *Dung lượng:* ${SIZE}
          👨‍💻 *Người kích hoạt:* ${BUILDER}

          📝 *Có gì mới:*
          ${NOTES}

          🎉 Mở TestFlight tải về tận hưởng thôi!"
          else
            MSG="❌ *Build thất bại rồi bạn hiền!*

          ⚠️ Tiến trình đóng gói hoặc tải lên TestFlight đã bị lỗi.
          📌 *Phiên bản:* ${VERSION_STR}
          👨‍💻 *Người kích hoạt:* ${BUILDER}
          🔗 *Xem chi tiết lỗi:* $RUN_URL"
          fi

          curl -s -X POST https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d message_thread_id="${TELEGRAM_TOPIC_ID}" \
            --data-urlencode text="$MSG" \
            -d parse_mode="Markdown"
